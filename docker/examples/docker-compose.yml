# docker-compose.yml — FYY Agent Sandbox 编排示例
#
# 使用方法:
#   docker compose up -d          # 后台启动
#   docker compose logs -f        # 查看日志
#   docker compose down           # 停止并删除容器
#   docker compose down -v        # 停止并删除容器和卷
#
# 自定义配置:
#   1. 复制此文件到你的项目目录
#   2. 根据需要修改 environment、volumes、ports 等配置
#   3. 运行 docker compose up -d

services:
  fyy-sandbox:
    # -----------------------------------------------------------------------
    # 镜像配置
    # -----------------------------------------------------------------------
    # 使用 FYY 沙箱官方镜像
    # 生产环境建议固定版本号，如 feiyueyun/fyy-sandbox:1.2.0
    image: feiyueyun/fyy-sandbox:latest
    container_name: fyy-sandbox
    restart: unless-stopped

    # -----------------------------------------------------------------------
    # 资源限制
    # -----------------------------------------------------------------------
    # 根据你的 Agent 负载调整资源配置
    deploy:
      resources:
        limits:
          cpus: "2.0"        # 最大 CPU 核心数
          memory: 4G         # 最大内存
        reservations:
          cpus: "0.5"        # 保底 CPU 核心数
          memory: 512M       # 保底内存

    # -----------------------------------------------------------------------
    # 环境变量
    # -----------------------------------------------------------------------
    environment:
      # 沙箱标识 — fyy CLI 检测此变量以确定运行环境
      - FYY_SANDBOX=1
      # 日志级别: debug, info, warn, error
      - FYY_LOG_LEVEL=info
      # 时区设置
      - TZ=Asia/Shanghai

    # -----------------------------------------------------------------------
    # 端口映射
    # -----------------------------------------------------------------------
    # 格式: 宿主机端口:容器端口
    ports:
      - "8080:8080"

    # -----------------------------------------------------------------------
    # 持久化存储
    # -----------------------------------------------------------------------
    volumes:
      # 命名卷 — 持久化沙箱数据（技能、工作空间、日志）
      - fyy-data:/data/fyy
      # 绑定挂载 — 加载自定义技能（只读）
      # 取消注释以挂载本地技能目录
      # - ./skills:/data/fyy/skills:ro

    # -----------------------------------------------------------------------
    # 安全加固
    # -----------------------------------------------------------------------
    security_opt:
      # 禁止容器内进程获取额外权限
      - no-new-privileges:true
    # 只读根文件系统（生产环境推荐）
    read_only: true
    # 临时文件系统挂载（配合 read_only 使用）
    tmpfs:
      - /tmp:size=100M
      - /run:size=10M

    # -----------------------------------------------------------------------
    # 健康检查
    # -----------------------------------------------------------------------
    healthcheck:
      test: ["CMD", "fyy", "version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# ---------------------------------------------------------------------------
# 卷定义
# ---------------------------------------------------------------------------
volumes:
  fyy-data:
    driver: local
