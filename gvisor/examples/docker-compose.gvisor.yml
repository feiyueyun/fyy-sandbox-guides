# docker-compose.yml — FYY Agent Sandbox gVisor 运行时编排示例
#
# 使用方法:
#   docker compose up -d          # 后台启动
#   docker compose logs -f        # 查看日志
#   docker compose down           # 停止并删除容器
#
# 前提条件:
#   - 已安装 gVisor runsc 运行时
#   - Docker daemon 已配置 runsc 运行时
#   详见: ../gvisor/examples/daemon.json 和 ../gvisor/examples/run-gvisor.sh

services:
  fyy-sandbox:
    # -----------------------------------------------------------------------
    # 镜像配置
    # -----------------------------------------------------------------------
    image: feiyueyun/fyy-sandbox:latest
    container_name: fyy-sandbox-gvisor
    restart: unless-stopped

    # -----------------------------------------------------------------------
    # gVisor 运行时
    # -----------------------------------------------------------------------
    # 使用 runsc 运行时替代默认的 runc
    # 提供用户态内核隔离，容器内进程无法直接访问宿主机内核
    runtime: runsc

    # -----------------------------------------------------------------------
    # 资源限制
    # -----------------------------------------------------------------------
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 512M

    # -----------------------------------------------------------------------
    # 环境变量
    # -----------------------------------------------------------------------
    environment:
      - FYY_SANDBOX=1
      - FYY_LOG_LEVEL=info
      - TZ=Asia/Shanghai

    # -----------------------------------------------------------------------
    # 端口映射
    # -----------------------------------------------------------------------
    ports:
      - "8080:8080"

    # -----------------------------------------------------------------------
    # 持久化存储
    # -----------------------------------------------------------------------
    volumes:
      - fyy-data:/data/fyy

    # -----------------------------------------------------------------------
    # 安全加固
    # -----------------------------------------------------------------------
    security_opt:
      - no-new-privileges:true

volumes:
  fyy-data:
    driver: local
