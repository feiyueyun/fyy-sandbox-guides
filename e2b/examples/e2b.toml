# e2b.toml — FYY Agent E2B 沙箱模板配置
#
# 使用方法:
#   1. 将此文件放在项目根目录，与 e2b.Dockerfile 同级
#   2. 运行: e2b template build
#   3. 使用: e2b sandbox create fyy-sandbox

# ---------------------------------------------------------------------------
# 模板基本信息
# ---------------------------------------------------------------------------
[template]
# 模板名称 — 用于 SDK 中引用
# 例如: Sandbox(template="fyy-sandbox")
name = "fyy-sandbox"

# Dockerfile 路径（相对于 e2b.toml 所在目录）
dockerfile = "e2b.Dockerfile"

# ---------------------------------------------------------------------------
# 环境变量
# ---------------------------------------------------------------------------
[template.env]
# 沙箱标识 — fyy CLI 检测此变量以确定运行环境
# 当 FYY_SANDBOX=1 时，fyy CLI 知道自己运行在 Layer-1 沙箱中
FYY_SANDBOX = "1"

# 日志级别: debug, info, warn, error
FYY_LOG_LEVEL = "info"

# ---------------------------------------------------------------------------
# 资源配置
# ---------------------------------------------------------------------------
# CPU 核心数
# 可选值: 1, 2, 4, 8
# 默认: 2
cpu_count = 2

# 内存大小 (MB)
# 可选范围: 512 - 16384 (16 GB)
# 默认: 4096 (4 GB)
memory_mb = 4096

# ---------------------------------------------------------------------------
# 超时设置
# ---------------------------------------------------------------------------
# 沙箱最大运行时间 (秒)
# 超时后沙箱自动销毁
# 可选范围: 1 - 3600 (1 小时)
# 默认: 300 (5 分钟)
timeout = 600
